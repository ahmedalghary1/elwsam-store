{% if has_variant %}
<div class="variant-badges">
    {% if pattern %}
        <span class="variant-badge variant-badge-pattern">
            <i class="fas fa-layer-group"></i> {{ pattern }}
        </span>
    {% endif %}
    
    {% if color_name %}
        <span class="variant-badge variant-badge-color" {% if color_code %}style="background-color: {{ color_code }}; color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.3);"{% endif %}>
            <i class="fas fa-palette"></i> {{ color_name }}
        </span>
    {% endif %}
    
    {% if size %}
        <span class="variant-badge variant-badge-size">
            <i class="fas fa-ruler"></i> {{ size }}
        </span>
    {% endif %}
</div>
{% endif %}
