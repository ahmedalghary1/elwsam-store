{% if page_obj.has_other_pages %}
  <nav class="dash-pagination" aria-label="ترقيم الصفحات">
    {% if page_obj.has_previous %}
      <a href="?page={{ page_obj.previous_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.status %}&status={{ request.GET.status }}{% endif %}{% if request.GET.category %}&category={{ request.GET.category }}{% endif %}{% if request.GET.role %}&role={{ request.GET.role }}{% endif %}{% if request.GET.type %}&type={{ request.GET.type }}{% endif %}">السابق</a>
    {% endif %}
    <span>صفحة {{ page_obj.number }} من {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
      <a href="?page={{ page_obj.next_page_number }}{% if request.GET.q %}&q={{ request.GET.q }}{% endif %}{% if request.GET.status %}&status={{ request.GET.status }}{% endif %}{% if request.GET.category %}&category={{ request.GET.category }}{% endif %}{% if request.GET.role %}&role={{ request.GET.role }}{% endif %}{% if request.GET.type %}&type={{ request.GET.type }}{% endif %}">التالي</a>
    {% endif %}
  </nav>
{% endif %}
